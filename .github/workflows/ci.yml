name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [develop, main]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─── Backend Checks ───
  backend:
    name: Backend — Lint, Test, Build & Push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check app/ --output-format=github

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          MONGO_URI: mongodb://localhost:27017/foreman_test_db
          FIREBASE_SERVICE_ACCOUNT_PATH: ./tests/mock_sa.json

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/foreman-backend:ci-${{ github.sha }}
          cache-from: type=gha

  # ─── Frontend Checks ───
  frontend:
    name: Frontend — Lint, Build & Push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-project
          VITE_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000'
          VITE_FIREBASE_APP_ID: 'ci-app-id'

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/foreman-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          build-args: |
            VITE_API_URL=https://placeholder.onrender.com
            VITE_FIREBASE_API_KEY=placeholder
            VITE_FIREBASE_AUTH_DOMAIN=placeholder.firebaseapp.com
            VITE_FIREBASE_PROJECT_ID=placeholder
            VITE_FIREBASE_STORAGE_BUCKET=placeholder.appspot.com
            VITE_FIREBASE_MESSAGING_SENDER_ID=000000
            VITE_FIREBASE_APP_ID=placeholder

  # ─── Security Scan ───
  security-scan:
    name: Security Scan
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull backend image from DockerHub
        run: |
          docker pull ${{ env.DOCKERHUB_USERNAME }}/foreman-backend:ci-${{ github.sha }}

      - name: Pull frontend image from DockerHub
        run: |
          docker pull ${{ env.DOCKERHUB_USERNAME }}/foreman-frontend:ci-${{ github.sha }}

      - name: Run backend security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKERHUB_USERNAME }}/foreman-backend:ci-${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Run frontend security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKERHUB_USERNAME }}/foreman-frontend:ci-${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
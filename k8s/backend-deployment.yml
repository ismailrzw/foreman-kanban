apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: foreman
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: foreman-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: foreman-secrets
                  key: MONGO_URI
            - name: FIREBASE_SERVICE_ACCOUNT_PATH
              value: "/secrets/serviceAccountKey.json"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: foreman-config
                  key: FRONTEND_URL
          volumeMounts:
            - name: firebase-sa
              mountPath: /secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: firebase-sa
          secret:
            secretName: firebase-sa-secret

---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: foreman
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP